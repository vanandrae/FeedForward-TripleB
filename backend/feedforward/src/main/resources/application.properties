spring.application.name=feedforward

# Setup Supabase PostgreSQL connection
spring.datasource.url=jdbc:postgresql://db.tlerzyzqmhrcttykdfzc.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=FeedForward123.

# JPA configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Hibernate properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true

# For stack trace error not to appear
server.error.include-stacktrace=never

# Server port
server.port=8080

# Connection pool settings (optional but recommended)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10